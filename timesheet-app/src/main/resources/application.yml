server:
  port: ${SERVER_PORT:6104}

spring:
  application:
    name: timesheet-app

  datasource:
    url: jdbc:mysql://${DB_HOST:139.196.156.81}:${DB_PORT:3306}/${DB_NAME:blog}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Root@123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 50
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  liquibase:
    enabled: true
    change-log: classpath:liquibase/master.xml

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.xu.timesheet.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.xu.timesheet: debug

blog:
  jwt:
    secret: ${BLOG_JWT_SECRET:change-this-in-env}
    expire-ms: ${BLOG_JWT_EXPIRE_MS:7200000}
